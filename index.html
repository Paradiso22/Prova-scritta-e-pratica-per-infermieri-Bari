<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz ASL Bari — Giovanni Paradiso</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    }

    .emoji { font-size: 64px; margin-bottom: 24px; display: block; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 16px;
      color: #1a202c;
    }

    p {
      font-size: 1rem;
      color: #4a5568;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin-bottom: 28px;
    }

    .coffee-label {
      font-size: 0.95rem;
      color: #718096;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
    .btn:active { transform: translateY(0); }

    .btn-revolut {
      background: #191c20;
      color: #fff;
    }

    .btn-paypal {
      background: #003087;
      color: #fff;
    }

    .footer {
      margin-top: 36px;
      font-size: 0.8rem;
      color: #a0aec0;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">🩺</span>
    <h1>Grazie per aver utilizzato l'app!</h1>
    <p>Spero ti sia stata utile per prepararti al meglio.<br>In bocca al lupo! 🍀</p>

    <hr class="divider">

    <p class="coffee-label">Se ti va, offrimi un caffè ☕</p>
    <div class="btn-group">
      <a class="btn btn-revolut" href="https://revolut.me/giovancw2d" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/></svg>
        Revolut
      </a>
      <a class="btn btn-paypal" href="https://www.paypal.com/donate/?business=gioparadiso95@gmail.com&currency_code=EUR" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h8a4 4 0 0 1 0 8H8l-2 8"/><path d="M10 8l-2 8"/></svg>
        PayPal
      </a>
    </div>

    <div class="footer" style="margin-top:20px">
      Hai qualche richiesta? <a href="mailto:gioparadiso95@gmail.com" style="color:#4a90e2;text-decoration:none;font-weight:600">Scrivimi una mail</a>
    </div>
    <div class="footer">Creata da Giovanni Paradiso</div>
    <div class="footer" style="margin-top:6px">Ecommerce Specialist, Web Developer &amp; Marketer</div>
  </div>
</body>
</html>
